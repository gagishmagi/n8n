# Use this Blueprint to deploy n8n on Render as a web
# service that uses a Postgres database to store
# workflow data.
#
# This Blueprint uses free instance types (specified by
# `plan`) for both the web service and the database. You
# can upgrade to paid instance types at any time to
# increase resources.

services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    # Prefer readiness so traffic only routes after Postgres is reachable.
    healthCheckPath: /healthz/readiness
    image:
      url: docker.io/n8nio/n8n:stable

    envVars:
      # Render forwards public HTTP to PORT (defaults to 10000). Binding here avoids
      # port-detection ambiguity when n8n also opens other local ports internally.
      - key: PORT
        value: "10000"
      - key: N8N_PORT
        value: "10000"

      # Render terminates TLS; set public scheme and forwarded headers.
      - key: N8N_PROTOCOL
        value: "https"
      - key: N8N_PROXY_HOPS
        value: "1"

      # Free Postgres can be slow to accept connections on cold start.
      - key: DB_POSTGRESDB_CONNECTION_TIMEOUT
        value: "60000"

      # Avoid internal JS/Python task-runner subprocess churn on constrained free instances.
      # Set true only if you need isolated Code runners; see task runner docs on n8n.io.
      - key: N8N_RUNNERS_ENABLED
        value: "false"

      # Managed Postgres expects TLS when using the blueprint-provided host.
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: "true"
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # After deploy, set in the Dashboard (exact URL from your service settings):
      # WEBHOOK_URL=https://<your-service>.onrender.com/
      # N8N_EDITOR_BASE_URL=https://<your-service>.onrender.com/

      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user

databases:
  - name: n8n-db
    plan: free
